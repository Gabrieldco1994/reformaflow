name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Domain package
        run: npm --workspace @reformaflow/domain run build
      - name: Generate Prisma Client
        run: npx prisma@5 generate --schema=prisma/schema.prisma
      - name: Type check - Domain
        run: cd packages/domain && npx tsc --noEmit
      - name: Type check - API
        run: cd apps/api && npx tsc --noEmit
      - name: Type check - Web
        run: cd apps/web && npx tsc --noEmit

  test-domain:
    name: Test Domain Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm --workspace @reformaflow/domain run test

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Domain package
        run: npm --workspace @reformaflow/domain run build
      - name: Generate Prisma Client
        run: npx prisma@5 generate --schema=prisma/schema.prisma
      - name: Run tests
        run: npm --workspace @reformaflow/api run test -- --no-coverage

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-domain, test-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Domain package
        run: npm --workspace @reformaflow/domain run build
      - name: Build Next.js
        run: npm --workspace @reformaflow/web run build
        env:
          NEXT_PUBLIC_API_URL: https://reformaflow-api.fly.dev

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-domain, test-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Domain package
        run: npm --workspace @reformaflow/domain run build
      - name: Generate Prisma Client
        run: npx prisma@5 generate --schema=prisma/schema.prisma
      - name: Build NestJS
        run: npm --workspace @reformaflow/api run build
