name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install workspace dependencies
        run: |
          cd packages/domain && npm ci
          cd ../../apps/api && npm ci
          cd ../../apps/web && npm ci

      - name: Generate Prisma Client
        run: cd apps/api && npx prisma generate --schema=../../prisma/schema.prisma

      - name: Type check - Domain
        run: cd packages/domain && npx tsc --noEmit

      - name: Type check - API
        run: cd apps/api && npx tsc --noEmit

      - name: Type check - Web
        run: cd apps/web && npx tsc --noEmit

  test-domain:
    name: Test Domain Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: cd packages/domain && npm ci

      - name: Run tests
        run: cd packages/domain && npx vitest run --coverage

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd packages/domain && npm ci
          cd ../../apps/api && npm ci

      - name: Generate Prisma Client
        run: cd apps/api && npx prisma generate --schema=../../prisma/schema.prisma

      - name: Run tests
        run: cd apps/api && npx jest --no-coverage

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd packages/domain && npm ci
          cd ../../apps/web && npm ci

      - name: Build Next.js
        run: cd apps/web && npx next build

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd packages/domain && npm ci
          cd ../../apps/api && npm ci

      - name: Generate Prisma Client
        run: cd apps/api && npx prisma generate --schema=../../prisma/schema.prisma

      - name: Build NestJS
        run: cd apps/api && npx nest build
